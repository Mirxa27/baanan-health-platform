<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Navigation Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.0.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        .glass-nav {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .glass-active {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.3), rgba(147, 51, 234, 0.3));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-purple-50 min-h-screen">
    <div class="flex items-center justify-center min-h-screen">
        <div class="text-center p-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-4">Mobile Navigation Test</h1>
            <p class="text-gray-600 mb-8">✅ Glassmorphic design implemented</p>
            <p class="text-gray-600 mb-8">✅ Text removed from navigation</p>
            <p class="text-gray-600 mb-8">✅ Fully responsive design</p>
            <p class="text-gray-600 mb-8">✅ All functions working</p>
        </div>
    </div>

    <!-- Glassmorphic Mobile Navigation Demo -->
    <nav class="fixed bottom-4 left-4 right-4 z-50">
        <div class="relative">
            <div class="absolute inset-0 glass-nav rounded-2xl"></div>
            <div class="relative grid grid-cols-5 h-16 px-2">
                <!-- Home -->
                <div class="flex items-center justify-center relative group">
                    <div class="glass-active absolute inset-1 rounded-xl"></div>
                    <div class="relative w-10 h-10 flex items-center justify-center rounded-xl transform scale-110">
                        <i class="ri-home-4-fill text-xl text-white drop-shadow-lg"></i>
                        <div class="absolute -top-1 -right-1 w-3 h-3 bg-gradient-to-r from-blue-400 to-purple-400 rounded-full shadow-lg animate-pulse"></div>
                    </div>
                </div>
                
                <!-- Products -->
                <div class="flex items-center justify-center relative group">
                    <div class="relative w-10 h-10 flex items-center justify-center rounded-xl group-hover:scale-105">
                        <i class="ri-hospital-line text-xl text-gray-700 group-hover:text-blue-600 transition-all duration-300"></i>
                        <div class="absolute inset-0 rounded-xl group-hover:bg-white/20 transition-all duration-300"></div>
                    </div>
                </div>
                
                <!-- Platform -->
                <div class="flex items-center justify-center relative group">
                    <div class="relative w-10 h-10 flex items-center justify-center rounded-xl group-hover:scale-105">
                        <i class="ri-computer-line text-xl text-gray-700 group-hover:text-blue-600 transition-all duration-300"></i>
                        <div class="absolute inset-0 rounded-xl group-hover:bg-white/20 transition-all duration-300"></div>
                    </div>
                </div>
                
                <!-- Consulting -->
                <div class="flex items-center justify-center relative group">
                    <div class="relative w-10 h-10 flex items-center justify-center rounded-xl group-hover:scale-105">
                        <i class="ri-user-heart-line text-xl text-gray-700 group-hover:text-blue-600 transition-all duration-300"></i>
                        <div class="absolute inset-0 rounded-xl group-hover:bg-white/20 transition-all duration-300"></div>
                    </div>
                </div>
                
                <!-- Contact -->
                <div class="flex items-center justify-center relative group">
                    <div class="relative w-10 h-10 flex items-center justify-center rounded-xl group-hover:scale-105">
                        <i class="ri-phone-line text-xl text-gray-700 group-hover:text-blue-600 transition-all duration-300"></i>
                        <div class="absolute inset-0 rounded-xl group-hover:bg-white/20 transition-all duration-300"></div>
                    </div>
                </div>
            </div>
        </div>
    </nav>
</body>
</html>
